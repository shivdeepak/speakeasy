name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # The steps below run only when a release PR is merged and a release is cut.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
      - uses: actions/setup-python@v5
        if: ${{ steps.release.outputs.release_created }}
        with:
          python-version: "3.12"
      - run: python3 scripts/validate.py speakeasy
        if: ${{ steps.release.outputs.release_created }}
      - run: ./scripts/package.sh
        if: ${{ steps.release.outputs.release_created }}
      - run: gh release upload "${{ steps.release.outputs.tag_name }}" dist/speakeasy.skill --clobber
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
